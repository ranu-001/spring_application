<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>

<body>

<section>

    <!-- Hero Section -->
    <div class="container text-center py-5">
        <h1 class="fw-bold">Welcome to DevOps Group</h1>
        <p class="text-muted">
            Explore beautiful places and discover amazing products.
        </p>
    </div>

    <!-- Carousel -->
    <div class="container mb-5">

        <div id="touristCarousel" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner rounded shadow">

                <div class="carousel-item active">
                    <img src="https://royalsamrattravels.in/wp-content/uploads/2023/02/Mysore-Palace-One-of-The-Most-Famous-Tourist-Places-in-Mysore.jpg"
                        class="d-block w-100"
                        style="height:400px;object-fit:cover;">
                </div>

                <div class="carousel-item">
                    <img src="https://assets-news.housing.com/news/wp-content/uploads/2022/06/29184410/10-best-tourist-places-to-visit-in-Bangalore-and-must-visit-places-near-it-686x400.jpg"
                        class="d-block w-100"
                        style="height:400px;object-fit:cover;">
                </div>

                <div class="carousel-item">
                    <img src="https://karnatakatourism.org/wp-content/uploads/2020/06/kalaburagi_fort.jpg"
                        class="d-block w-100"
                        style="height:400px;object-fit:cover;">
                </div>

                <div class="carousel-item">
                    <img src="https://www.coorgwildernessresort.in/images/our-diaries/a-land-of-historical-sites-waterfalls-scenic-rivers/a-land-of-historical-sites-waterfalls-scenic-rivers-1.jpg"
                        class="d-block w-100"
                        style="height:400px;object-fit:cover;">
                </div>

                <div class="carousel-item">
                    <img src="https://s3.india.com/wp-content/uploads/2024/09/lesser-kmown-hubli.jpg"
                        class="d-block w-100"
                        style="height:400px;object-fit:cover;">
                </div>

            </div>

            <button class="carousel-control-prev"
                type="button"
                data-bs-target="#touristCarousel"
                data-bs-slide="prev">

                <span class="carousel-control-prev-icon"></span>

            </button>

            <button class="carousel-control-next"
                type="button"
                data-bs-target="#touristCarousel"
                data-bs-slide="next">

                <span class="carousel-control-next-icon"></span>

            </button>

        </div>

    </div>

    <!-- Products -->

    <div class="container">

        <h2 class="text-center mb-4">Products</h2>

        <div class="row">

            <div class="col-md-4 mb-4"
                th:each="product : ${products}">

                <div class="card shadow-sm h-100">

                    <img th:if="${product.base64Image}"
                        th:src="'data:image/jpeg;base64,' + ${product.base64Image}"
                        class="card-img-top"
                        style="height:220px;object-fit:cover;">

                    <div class="card-body">

                        <h5 th:text="${product.productName}"></h5>

                        <p class="text-muted"
                            th:text="${product.productDescription}"></p>

                        <h5 class="text-success">
                            ₹ <span th:text="${product.price}"></span>
                        </h5>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
