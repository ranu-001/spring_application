<section>

<div class="container mt-3">

    <!-- Search -->
    <div class="mb-4">
        <input type="text"
               class="form-control rounded-pill"
               placeholder="Search for products...">
    </div>

    <!-- Banner -->

    <div id="bannerCarousel" class="carousel slide mb-4" data-bs-ride="carousel">

        <div class="carousel-inner rounded">

            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1542838132-92c53300491e"
                     class="d-block w-100"
                     style="height:250px;object-fit:cover;">
            </div>

            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c"
                     class="d-block w-100"
                     style="height:250px;object-fit:cover;">
            </div>

        </div>

    </div>

    <!-- Categories -->

    <h4 class="mb-3">Categories</h4>

    <div class="row text-center mb-5">

        <div class="col">
            🥛
            <p>Milk</p>
        </div>

        <div class="col">
            🍎
            <p>Fruits</p>
        </div>

        <div class="col">
            🥬
            <p>Vegetables</p>
        </div>

        <div class="col">
            🍫
            <p>Snacks</p>
        </div>

    </div>

    <!-- Products -->

    <h4 class="mb-3">Best Selling</h4>

    <div class="row">

        <div class="col-md-3 col-sm-6 mb-4"
             th:each="product:${products}">

            <div class="card border-0 shadow-sm">

                <img th:if="${product.base64Image}"
                     th:src="'data:image/jpeg;base64,'+${product.base64Image}"
                     class="card-img-top"
                     style="height:180px;object-fit:cover;">

                <div class="card-body">

                    <h6 th:text="${product.productName}"></h6>

                    <h5 class="text-success">
                        ₹ <span th:text="${product.price}"></span>
                    </h5>

                    <button class="btn btn-success w-100">
                        ADD
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</section>
